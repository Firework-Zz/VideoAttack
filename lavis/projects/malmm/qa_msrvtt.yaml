model:
  arch: blip2_vicuna_instruct
  model_type: vicuna7b
  load_finetuned: False
  load_pretrained: True
  image_size: 224
  drop_path_rate: 0
  use_grad_checkpoint: False
  vit_precision: "fp16"
  freeze_vit: False
  num_query_token: 32
  llm_model: "/data0/pretrained/MA-LMM/llm/vicuna-7b"
  load_in_8bit: True  # 保持 8bit 省显存

datasets:
  msrvtt_qa:
    vis_processor:
        train:
          name: "blip2_video_train"
          image_size: 224
        eval:
          name: "blip2_video_eval"
          image_size: 224
    text_processor:
        train:
          name: "blip_question"
          prompt: "Question: {} Short answer:"
        eval:
          name: "blip_question"
          # 【核心配置】必须保留 Short answer
          prompt: "Question: {} Short answer:"
    
    num_frames: 10

    # 【核心配置】开启特征读取，去读 .pt 文件
    use_adv_feats: True 
    # 指向刚才提取脚本 main_pixel_malmm_clean_final.py 的输出目录
    adv_feats_dir: "/data2/codefile/fjh/data/feats_clean_final_correct"

    build_info:
        annotations:
            # 指向刚才生成的强制字典格式 Mini 集 (跑通后可换回 qa_test_fixed.json)
            train:
                storage: /data0/data/msrvtt/annotation/qa_mini_final.json
                ans2label: /data0/data/msrvtt/annotation/qa_ans2label.json
            val:
                storage: /data0/data/msrvtt/annotation/qa_mini_final.json
            test:
                storage: /data0/data/msrvtt/annotation/qa_mini_final.json
        images: 
            # 这里的路径只要真实存在即可，为了骗过 Builder 检查
            storage: /data2/codefile/fjh/data/feats_clean_final_correct

run:
  task: vqa
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 1e-5
  min_lr: 0
  warmup_lr: 1e-8
  warmup_steps: 1000
  weight_decay: 0.05
  max_epoch: 10
  batch_size_train: 16
  batch_size_eval: 1  # 保持为 1 防止 OOM
  num_workers: 8
  accum_grad_iters: 1
  max_len: 10
  min_len: 1
  num_beams: 1        # 保持为 1 加速且省显存
  inference_method: "generate"
  prompt: "Question: {} Short answer:"
  seed: 42
  output_dir: "output"
  amp: True
  evaluate: True
  train_splits: ["train"]
  valid_splits: ["val"]
  test_splits: ["test"]
  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True
  # 【修改名称】区分于之前的 sanity check
  prefix: "clean_feat_test_final" 
  report_metric: True
